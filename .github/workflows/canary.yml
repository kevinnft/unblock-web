name: Canary

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly to catch upstream regressions (Cloudflare changes,
    # TinyFish API changes, mirror availability shifts).
    - cron: "0 9 * * 1"   # Mondays 09:00 UTC

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Install Chromium (with platform override fallback)
        run: |
          # Try normal install first; fall back to override if the runner's
          # distro isn't on the Playwright/Patchright allowlist.
          if ! python3 -m playwright install chromium 2>/dev/null; then
            PLAYWRIGHT_HOST_PLATFORM_OVERRIDE=ubuntu24.04-x64 \
              python3 -m playwright install chromium
          fi
          if ! python3 -m patchright install chromium 2>/dev/null; then
            PLAYWRIGHT_HOST_PLATFORM_OVERRIDE=ubuntu24.04-x64 \
              python3 -m patchright install chromium
          fi

      - name: Run canary (verbose)
        env:
          # TinyFish key is optional — set as a repo secret to enable Tier 2 check.
          # Without it, Tier 2 is skipped (warning only) and Tier 1 + 3 must pass.
          TINYFISH_API_KEY: ${{ secrets.TINYFISH_API_KEY }}
          UNBLOCK_WEB_SKIP_TIER2: ${{ secrets.TINYFISH_API_KEY == '' && '1' || '' }}
        run: |
          python3 scripts/verify-stack.py --verbose

      - name: Run examples (smoke test)
        run: |
          # Quick smoke — just verify the import + API surface, don't actually
          # fetch external URLs in CI (flaky, slow, may be rate-limited).
          python3 -c "
          from scrapling.fetchers import StealthyFetcher
          import inspect
          assert hasattr(StealthyFetcher, 'fetch'), 'StealthyFetcher.fetch missing'
          # Verify the parameter we use exists
          src = inspect.getsource(StealthyFetcher.fetch)
          for kw in ['solve_cloudflare', 'network_idle', 'wait', 'headless']:
              assert kw in src, f'param {kw} no longer in StealthyFetcher.fetch'
          print('All required parameters present.')
          "
