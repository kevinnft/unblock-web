name: Canary

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"   # Mondays 09:00 UTC

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install package with stealth extra
        run: |
          python -m pip install --upgrade pip
          pip install '.[stealth]'

      - name: Install Chromium via unblock-web heal
        run: |
          unblock-web heal

      - name: Run canary
        env:
          TINYFISH_API_KEY: ${{ secrets.TINYFISH_API_KEY }}
          UNBLOCK_WEB_SKIP_TIER2: ${{ secrets.TINYFISH_API_KEY == '' && '1' || '' }}
        run: |
          unblock-web verify --verbose

      - name: Smoke test library API
        run: |
          python -c "
          from unblock_web import fetch, FetchResult, verify_stack, __version__
          print(f'unblock-web {__version__}')
          # T0 sanity
          r = fetch('https://example.com', tier='T0')
          assert r.status == 200
          assert 'Example Domain' in r.text
          print(f'T0 fetch OK: tier={r.tier} chars={len(r.text)}')
          "
